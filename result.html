<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Result game</title>
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body>
    <header class="header">
      <article class="score">
        <a href="#" class="score__logo"> </a>
        <div class="score__content">
          <p>score</p>
          <span>0</span>
        </div>
      </article>
    </header>
    <main class="main main__result">
      <article>
        <p>YOU PICKED</p>
        <div class="game game__selected game__selected--user">
          <button class="none">
            <img src="./images/icon-paper.svg" alt="" />
          </button>
          <button class="none">
            <img src="./images/icon-scissors.svg" alt="" />
          </button>
          <button class="none">
            <img src="./images/icon-rock.svg" alt="" />
          </button>
        </div>
        <span class="circle"></span>
      </article>
      <article>
        <p>THE HOUSE PICKED</p>
        <div class="game game__selected game__selected--computer">
          <button class="none">
            <img src="./images/icon-paper.svg" alt="" />
          </button>
          <button class="none">
            <img src="./images/icon-scissors.svg" alt="" />
          </button>
          <button class="none">
            <img src="./images/icon-rock.svg" alt="" />
          </button>
        </div>
        <span class="circle"></span>
      </article>
    </main>
    <footer class="footer">
      <button class="btn__rules-open">RULES</button>
      <article class="modalWindow modalClose">
        <div class="modalWindow__inner">
          <div class="modalWindow__content">
            <strong>rules</strong>
            <button class="btn__rules-close">
              <img src="./images/icon-close.svg" alt="" />
            </button>
            <div class="modalWindow__rules">
              <img src="./images/image-rules.svg" alt="" />
            </div>
          </div>
        </div>
      </article>
    </footer>
    <script type="module" src="./scripts/app.js"></script>
    <script type="module" src="./scripts/game.js"></script>
  </body>
</html>
